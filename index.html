<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculadora</title>
        <link rel="stylesheet" href="assets/css/normalize.css" />
        <link rel="stylesheet" href="assets/css/estilos.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    </head>
    <body>
        <div class="macro">
            <div class="barra">
                <div class="botonr">
                    <p>
                    <span class="boton-rojo"></span>
                    </p>
                </div>
                <div class="botona">
                    <p>
                    <span class="boton-amarillo"></span>
                    </p>
                </div>
                <div class="botonv">
                    <p>
                    <span class="boton-verde"></span>
                    </p>
                </div>
            </div>
            <div class="ope">
                0
            </div>
            <div class="tabla_nums">
                <div class="nums">
                    <div class="one_op1"><p>AC</p></div>
                    <div class="one_op1"><p>+/-</p></div>
                    <div class="one_op1"><p>%</p></div>
                    <div class="four_op"><p>÷</p></div>
                </div>
                <div class="nums">
                    <div class="one_op"><p>7</p></div>
                    <div class="one_op"><p>8</p></div>
                    <div class="one_op"><p>9</p></div>
                    <div class="four_op"><p>x</p></div>
                </div>
                <div class="nums">
                    <div class="one_op"><p>4</p></div>
                    <div class="one_op"><p>5</p></div>
                    <div class="one_op"><p>6</p></div>
                    <div class="four_op"><p>-</p></div>
                </div>
                <div class="nums">
                    <div class="one_op"><p>1</p></div>
                    <div class="one_op"><p>2</p></div>
                    <div class="one_op"><p>3</p></div>
                    <div class="four_op"><p>+</p></div>
                </div>
                <div class="nums">
                    <div class="one_op5"><p>0</p></div>
                    <div class="one_op"><p>,</p></div>
                    <div class="four_op5"><p>=</p></div>
                </div>
            </div>
        </div>
    </body>
</html>
